<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Automator Pro - it.adi.p</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .blob {
            position: absolute; width: 300px; height: 300px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
            filter: blur(60px); border-radius: 50%; z-index: -1;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-5%, -5%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.2); }
        }

        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155; transition: .4s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Preview Modal */
        #previewModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; flex-direction: column;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="bg-animate">
        <div class="blob" style="top: 10%; left: 10%;"></div>
        <div class="blob" style="bottom: 10%; right: 10%; animation-delay: -3s; background: rgba(147, 51, 234, 0.05);"></div>
    </div>

    <div class="max-w-xl w-full mx-auto py-8">
        <div class="bg-slate-800/60 backdrop-blur-3xl border border-slate-700/50 p-6 md:p-10 rounded-[2.5rem] shadow-2xl">
            
            <header class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
                    <i data-lucide="monitor-smartphone" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white">PWA <span class="text-blue-500">Master</span></h1>
                <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest font-semibold">it.adi.p Builder</p>
            </header>

            <!-- Configuration -->
            <div class="space-y-4 mb-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-slate-900/60 p-4 rounded-2xl border border-slate-700/40">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-1">App Name</label>
                        <input type="text" id="appName" value="My Awesome App" class="w-full bg-transparent border-none outline-none text-white font-bold text-sm">
                    </div>
                    <div class="bg-slate-900/60 p-4 rounded-2xl border border-slate-700/40 flex items-center justify-between">
                        <div>
                            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block">Theme Color</label>
                            <span id="colorHex" class="text-xs font-mono text-blue-400 font-bold">#3B82F6</span>
                        </div>
                        <input type="color" id="themeColor" value="#3b82f6" class="w-8 h-8 bg-transparent border-none cursor-pointer">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div class="bg-slate-900/60 p-4 rounded-2xl border border-slate-700/40 flex items-center justify-between">
                        <span class="text-sm font-bold text-slate-200">Copyright it.adi.p</span>
                        <label class="switch">
                            <input type="checkbox" id="copyToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="bg-slate-900/60 p-4 rounded-2xl border border-slate-700/40 flex items-center justify-between">
                        <span class="text-sm font-bold text-slate-200">Splash Screen</span>
                        <label class="switch">
                            <input type="checkbox" id="welcomeToggle" checked onchange="toggleWelcomeInput()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div id="welcomeArea" class="bg-slate-900/60 p-4 rounded-2xl border border-slate-700/40">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-1">Welcome Text</label>
                    <input type="text" id="welcomeText" value="Selamat Datang" class="w-full bg-transparent border-none outline-none text-white font-bold text-sm">
                </div>
            </div>

            <!-- Upload Area -->
            <div id="dropZone" class="border-2 border-dashed border-slate-700 rounded-3xl p-8 text-center hover:border-blue-500 transition-all cursor-pointer bg-slate-900/30 relative mb-6">
                <input type="file" id="htmlInput" accept=".html" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <div id="uploadContent" class="space-y-2">
                    <i data-lucide="file-up" class="w-8 h-8 text-slate-500 mx-auto"></i>
                    <p class="text-slate-400 text-sm font-medium">Klik atau seret <span class="text-blue-500 font-bold">index.html</span></p>
                </div>
            </div>

            <!-- Buttons Area -->
            <div id="actionArea" class="hidden flex flex-col sm:flex-row gap-3">
                <button onclick="openPreview()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2">
                    <i data-lucide="eye" class="w-5 h-5"></i> PRATINJAU
                </button>
                <button onclick="processAndDownload()" class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2 transition-all active:scale-95">
                    <i data-lucide="download" class="w-5 h-5"></i> DOWNLOAD .ZIP
                </button>
            </div>

            <div id="messageBox" class="mt-4 p-3 rounded-xl hidden text-center text-[10px] font-black uppercase tracking-widest"></div>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-slate-600 text-[10px] font-black uppercase tracking-[0.5em] mb-1">Developed By</p>
            <p class="text-white font-bold text-xl">it.adi.p <span class="text-blue-600">© 2024</span></p>
        </footer>
    </div>

    <!-- Live Preview Modal -->
    <div id="previewModal">
        <div class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center">
            <div class="flex items-center gap-3 text-slate-400">
                <i data-lucide="info" class="w-4 h-4"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Mode Pratinjau PWA</span>
            </div>
            <button onclick="closePreview()" class="bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all">
                TUTUP
            </button>
        </div>
        <div class="flex-1 bg-white relative">
            <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const htmlInput = document.getElementById('htmlInput');
        const dropZone = document.getElementById('dropZone');
        const uploadContent = document.getElementById('uploadContent');
        const actionArea = document.getElementById('actionArea');
        const themeColorInput = document.getElementById('themeColor');
        const colorHexDisplay = document.getElementById('colorHex');
        const messageBox = document.getElementById('messageBox');
        const previewModal = document.getElementById('previewModal');
        const previewFrame = document.getElementById('previewFrame');

        let selectedFile = null;

        themeColorInput.addEventListener('input', (e) => {
            colorHexDisplay.textContent = e.target.value.toUpperCase();
        });

        function toggleWelcomeInput() {
            const area = document.getElementById('welcomeArea');
            area.style.opacity = document.getElementById('welcomeToggle').checked ? "1" : "0.3";
        }

        htmlInput.addEventListener('change', (e) => handleFiles(e.target.files));
        ['dragenter', 'dragover'].forEach(n => dropZone.addEventListener(n, (e) => { e.preventDefault(); dropZone.classList.add('drop-zone--over'); }));
        ['dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, (e) => { e.preventDefault(); dropZone.classList.remove('drop-zone--over'); }));
        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));

        function handleFiles(files) {
            if (files.length > 0 && files[0].name.endsWith('.html')) {
                selectedFile = files[0];
                uploadContent.innerHTML = `<p class="text-blue-500 font-black text-sm uppercase tracking-tighter italic">✓ ${selectedFile.name} READY</p>`;
                actionArea.classList.remove('hidden');
                lucide.createIcons();
            }
        }

        async function buildFinalHTML() {
            const appName = document.getElementById('appName').value || "PWA App";
            const themeColor = themeColorInput.value;
            const useCopy = document.getElementById('copyToggle').checked;
            const useWelcome = document.getElementById('welcomeToggle').checked;
            const welcomeText = document.getElementById('welcomeText').value || "Selamat Datang";
            
            const contentHTML = await selectedFile.text();

            const pwaHeader = `\n    <!-- PWA Config by it.adi.p -->\n    <meta name="theme-color" content="${themeColor}">\n    <link rel="manifest" href="manifest.json">\n    <link rel="apple-touch-icon" href="icon-192.png">`;

            let components = "";
            if (useWelcome) {
                components += `\n    <div id="pwa-splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:${themeColor};z-index:9999999;display:flex;align-items:center;justify-content:center;transition:opacity 0.8s;color:white;font-family:sans-serif;">\n        <div style="text-align:center;">\n            <h1 style="font-size:2.2rem;margin:0;font-weight:bold;">${welcomeText}</h1>\n            <p style="font-size:0.6rem;opacity:0.6;margin-top:12px;letter-spacing:3px;">POWERED BY IT.ADI.P</p>\n        </div>\n    </div>\n    <script>window.addEventListener('load',()=>{setTimeout(()=>{const s=document.getElementById('pwa-splash');if(s)s.style.opacity='0';setTimeout(()=>s?s.remove():null,800);},2200);});<\/script>`;
            }

            if (useCopy) {
                components += `\n    <div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:rgba(128,128,128,0.5);z-index:999999;pointer-events:none;font-family:sans-serif;">© it.adi.p</div>`;
            }

            components += `\n    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}<\/script>`;

            let finalHTML = contentHTML;
            if (finalHTML.includes('</head>')) finalHTML = finalHTML.replace('</head>', pwaHeader + '\n</head>');
            else finalHTML = pwaHeader + finalHTML;

            if (finalHTML.includes('</body>')) finalHTML = finalHTML.replace('</body>', components + '\n</body>');
            else finalHTML += components;

            return finalHTML;
        }

        async function openPreview() {
            const finalHTML = await buildFinalHTML();
            previewFrame.srcdoc = finalHTML;
            previewModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closePreview() {
            previewModal.style.display = 'none';
            previewFrame.srcdoc = '';
            document.body.style.overflow = 'auto';
        }

        async function processAndDownload() {
            try {
                const finalHTML = await buildFinalHTML();
                const appName = document.getElementById('appName').value || "PWA App";
                const themeColor = themeColorInput.value;
                const zip = new JSZip();

                const manifest = {
                    "name": appName, "short_name": appName.substring(0,12),
                    "start_url": ".", "display": "standalone",
                    "background_color": "#ffffff", "theme_color": themeColor,
                    "icons": [{"src":"icon-192.png","sizes":"192x192","type":"image/png"},{"src":"icon-512.png","sizes":"512x512","type":"image/png"}]
                };

                const sw = `const C='pwa-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./index.html']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;

                zip.file("index.html", finalHTML);
                zip.file("manifest.json", JSON.stringify(manifest, null, 2));
                zip.file("sw.js", sw);

                const blob = await zip.generateAsync({type:"blob"});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${appName.toLowerCase().replace(/\s/g,'_')}_pwa.zip`;
                a.click();
                
                showMsg("BERHASIL! CEK FOLDER UNDUHAN ANDA.", "success");
            } catch (err) {
                showMsg("TERJADI KESALAHAN.", "error");
            }
        }

        function showMsg(text, type) {
            messageBox.textContent = text;
            messageBox.className = `mt-4 p-3 rounded-xl text-center text-[10px] font-black uppercase tracking-widest ${type === 'error' ? 'bg-red-500/10 text-red-400' : 'bg-blue-500/10 text-blue-400'}`;
            messageBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
